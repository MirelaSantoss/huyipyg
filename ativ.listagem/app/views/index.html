{% extends 'layout.html' %}

{% block conteudo %}
    <form action="{{ url_for('filmes.add_filmes') }}" method="POST">
        <input type="text" name="titulo" placeholder="Título do filme" required>
        <button type="submit">Adicionar Filme</button>
    </form>

        <ul>
        {% for filme in filmes %}
        
        <li>
            {% if filme.completa %}
            <strike>{{ filme.titulo }}</strike>
            {% else %}
                {{ filme.titulo }}
                <a href="{{ url_for('filmes.completar_filme', filme_id = filme.id) }}">[Concluir]</a>
            {% endif %}   
            <a href="#" onclick="deletarFilme(event, '{{url_for('filmes.deletar_filme',filme_id = filme.id)}}')">[Deletar]</a>
        </li>
        {% endfor %}

        </ul>
        <script>
            function deletarFilme(event,url) {
                event.preventDefault();
                
                fetch(url, {
                    method: 'DELETE'
                })
                .then(resposta => {
                    if (responsta.ok) {
                        window.location.reload();
                    } else {
                        alert('Erro ao deletar o filme.');
                    }
                });
            }
        </script>
{% endblock %}
